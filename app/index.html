<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Enterprise Lead Intelligence and Scoring System</title>
    <meta
      name="description"
      content="Searchable dashboard for ELISS lead dossiers with collective sales intelligence."
    />
    <meta name="theme-color" content="#0a0a0e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ELISS" />
    <!-- iOS home-screen tile: must be a PNG (iOS ignores SVG apple-touch-icons
         and fills transparency with black, so this is an opaque tile). -->
    <link rel="apple-touch-icon" sizes="180x180" href="/app/apple-touch-icon.png" />
    <!-- PWA manifest drives the Android/Chrome install icon + standalone mode. -->
    <link rel="manifest" href="/app/manifest.webmanifest" />
    <!-- Catalyst Web SDK is loaded + initialized by src/lib/catalyst-client.ts.
         The auto-injected /__catalyst/sdk/init.js is intentionally skipped because
         it ships api_domain:"" on Web Client Hosting, which yields broken URLs. -->

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
